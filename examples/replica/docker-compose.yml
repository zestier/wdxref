services:
  kvrocks:
    image: docker.io/apache/kvrocks:2.11.0
    command: 
      - "--dir"
      - "/data/kvrocks"
      - "--rocksdb.compression"
      - "zstd"
      # Memory: block cache is 4GB by default, way over the 2GB container limit
      - "--rocksdb.block_cache_size"
      - "768"
      # Memory: smaller write buffers flush faster and use less RAM
      # 4 column families × 2 buffers × 32MB = 256MB
      - "--rocksdb.write_buffer_size"
      - "32"
      - "--rocksdb.max_write_buffer_number"
      - "2"
      # Memory: trigger WAL flushes sooner to bound WAL memory
      - "--rocksdb.max_total_wal_size"
      - "256"
      # Stalls: rate-limit compaction I/O to 100MB/s so it doesn't starve reads
      - "--max-io-mb"
      - "100"
      # Stalls: fewer parallel compaction threads = less memory spike, less I/O contention
      - "--rocksdb.max_background_jobs"
      - "2"
      - "--rocksdb.max_subcompactions"
      - "1"
    restart: unless-stopped
    volumes:
      - kvrocks-data:/data/kvrocks
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6666", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  replica:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: replica
    restart: unless-stopped
    depends_on:
      kvrocks:
        condition: service_healthy
    environment:
      - KVROCKS_ADDR=kvrocks:6666
      - UPSTREAM_URL=${UPSTREAM_URL:?Set UPSTREAM_URL to the upstream replicator (e.g. http://primary-host:8081)}
      - DISABLE_CHANGELOG=1

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      kvrocks:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      - KVROCKS_ADDR=kvrocks:6666
      - LISTEN_ADDR=:8080

volumes:
  kvrocks-data:
